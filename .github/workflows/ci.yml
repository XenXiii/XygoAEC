name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test suite (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # node:sqlite is available without a flag on Node 24+.
        node-version: ["24.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      # No dependency install step: the project has zero third-party dependencies.
      - name: Run full test suite
        run: npm test
      - name: Verify audit chain
        run: npm run verify:audit
