name: Dependency Review

# Fails a PR that introduces dependencies with known vulnerabilities or
# disallowed licenses. The project currently has zero third-party dependencies;
# this gate keeps it deliberate if that ever changes.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
